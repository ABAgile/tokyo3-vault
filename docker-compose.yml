# docker-compose.yml — full dev rig: Postgres + NATS + vaultd + Traefik + IdP
#
# Default stack uses tokyo3-auth as the IdP at https://auth.localhost:
#     make docker-up
#
# Authentik variant (swap IdPs — Authentik takes over at https://authentik.localhost
# while the tokyo3-auth profile stays down):
#     make docker-up-authentik
#
# Hardened mTLS variant (TLS on every inter-service hop):
#     make docker-up-mtls    # layers docker-compose.mtls.yml on top
#
# Switching between IdPs is `make docker-down && make docker-up-<choice>` —
# profiles gate which IdP starts, but compose does not stop the other one
# when you switch, so a clean down avoids running both at once.
#
# ── First-time setup (default: tokyo3-auth) ──────────────────────────────────
#
# 0. Build the tokyo3-auth image once (vault's compose pulls
#    `abagile/tokyo3-auth:latest` by image tag, not by source path):
#
#        cd ../auth && make docker-build && cd -
#
# 1. `make docker-up` brings up Postgres + NATS + vaultd + Traefik + tokyo3-auth.
#    vaultd's OIDC stays disabled until you finish the auth-client wiring
#    (steps 2–4 below).
#
# 2. Browse https://auth.localhost → "Register" to seat the first admin user
#    (AUTH_ALLOW_REGISTRATION=true on the dev rig). The first registered user
#    is promoted to admin automatically.
#
# 3. Admin portal → /portal/admin/clients/new
#      Name:           vault
#      Redirect URIs:  https://vault.localhost/api/v1/auth/oidc/callback
#      Backchannel:    https://vault.localhost/api/v1/auth/oidc/backchannel-logout
#      Scopes:         openid email profile offline_access
#    Copy the Client ID / Client Secret it returns.
#
# 4. Paste the values into .env and re-run `make docker-up`:
#      VAULT_OIDC_CLIENT_ID=<id>
#      VAULT_OIDC_CLIENT_SECRET=<secret>
#
# 5. Browse https://vault.localhost → "Continue with SSO".
#
# ── First-time setup (alternative: Authentik) ────────────────────────────────
#
# 1. `make docker-up-authentik` brings the same core stack up with Authentik
#    at https://authentik.localhost (the tokyo3-auth profile is not started).
#
# 2. Browse https://authentik.localhost → akadmin (use AUTHENTIK_BOOTSTRAP_*
#    in .env to skip the initial-setup flow, or hit
#    https://authentik.localhost/if/flow/initial-setup/ directly).
#
# 3. Admin interface → Applications → Providers → Create
#      Type:           OAuth2/OpenID Provider
#      Name:           vault
#      Client type:    Confidential
#      Redirect URIs:  https://vault.localhost/api/v1/auth/oidc/callback
#      Backchannel:    https://vault.localhost/api/v1/auth/oidc/backchannel-logout
#      Signing key:    authentik Self-signed Certificate
#      Scopes:         openid email profile
#    Copy the Client ID / Client Secret. Then Applications → Applications →
#    Create, link the provider.
#
# 4. Paste into .env, plus override the issuer so vaultd points at Authentik
#    rather than the tokyo3-auth default:
#      VAULT_OIDC_ISSUER=https://authentik.localhost/application/o/vault/
#      VAULT_OIDC_CLIENT_ID=<id>
#      VAULT_OIDC_CLIENT_SECRET=<secret>
#    Then `make docker-up-authentik` again.
#
# ── Required env vars (set in shell or .env file) ─────────────────────────────
#   VAULT_MASTER_KEY            64-char hex key (vault keygen)
#   VAULT_ADMIN_DB_PASSWORD     main vault DB admin password (DDL owner, runs migrations)
#   VAULT_DB_PASSWORD           main vault DB app password (DML-only)
#   AUTH_MASTER_KEY             64-char hex key for tokyo3-auth (`docker compose run --rm auth keygen`)
#   AUTH_ADMIN_DB_PASSWORD      tokyo3-auth admin DB password
#   AUTH_DB_PASSWORD            tokyo3-auth app DB password
#   AUTHENTIK_SECRET_KEY        random 50+ char string (openssl rand -base64 60); only consumed by --profile authentik
#   AUTHENTIK_PG_PASSWORD       password for Authentik's internal Postgres role; only consumed by --profile authentik
#
# Optional (usernames default to *_admin / *_app):
#   VAULT_ADMIN_DB_USERNAME     main vault DB admin username (default: vault_admin)
#   VAULT_DB_USERNAME           main vault DB app username   (default: vault_app)
#   AUTH_ADMIN_DB_USERNAME      tokyo3-auth admin DB username (default: auth_admin)
#   AUTH_DB_USERNAME            tokyo3-auth app DB username   (default: auth_app)
#
# Note: DB credentials and usernames above are only applied on first startup
# when the data volume is empty (postgres initdb). Changing them after the
# volume is built has no effect — use ALTER ROLE in psql to update an existing
# database, then update .env to match.
#
# ── Architecture ──────────────────────────────────────────────────────────────
#   Browser ─https─> host:443 ─> Traefik
#                                  ├─ Host: vault.localhost       ─> vaultd:443             (HTTPS)
#                                  ├─ Host: auth.localhost        ─> auth:443               (HTTPS, tokyo3-auth, default)
#                                  └─ Host: authentik.localhost   ─> authentik-server:9000  (HTTP, --profile authentik)
#
#   vaultd  ─https─> {auth,authentik}.localhost:443 ─> Traefik ─> chosen IdP
#                    (hostnames resolve via traefik's network aliases;
#                     vaultd trusts the mkcert CA via SSL_CERT_FILE).
#
# Traefik holds a single mkcert-issued cert with SANs covering
# vault.localhost + auth.localhost + authentik.localhost + localhost.

services:

  # ── Main vault database ───────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    entrypoint: ["sh", "/shared/postgres/pg-entrypoint.sh"]
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      PG_INIT_SCRIPT:    /shared/postgres/db-init.sh
      POSTGRES_USER:     ${VAULT_ADMIN_DB_USERNAME:-vault_admin}
      POSTGRES_PASSWORD: ${VAULT_ADMIN_DB_PASSWORD:?VAULT_ADMIN_DB_PASSWORD is required}
      POSTGRES_DB:       vault
      VAULT_DB_USERNAME: ${VAULT_DB_USERNAME:-vault_app}
      VAULT_DB_PASSWORD: ${VAULT_DB_PASSWORD:?VAULT_DB_PASSWORD is required}
    volumes:
      - shared_data:/shared:ro
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VAULT_ADMIN_DB_USERNAME:-vault_admin} -d vault"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── NATS JetStream (authoritative audit event store) ──────────────────────
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
    volumes:
      - nats_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s

  # ── nats-box: stream provisioner + interactive shell ──────────────────────
  # On startup, ensures the vault_audit JetStream stream exists (always) plus
  # auth_audit (tokyo3-auth's audit sink — created unconditionally since the
  # auth service is in the default profile and would 503 fail-closed without
  # its stream). Without these streams, the producing service's first audit
  # publish would fail and every audit-emitting handler would 503 fail-closed.
  # Provisioning here keeps each service's NATS credential PUBLISH-only.
  #
  # After provisioning the container stays alive (tail -f /dev/null) so you
  # can:
  #   docker compose exec natsbox nats stream info vault_audit
  #   docker compose exec natsbox nats sub 'vault.audit.events'
  natsbox:
    # Pinned (not :latest) so docker doesn't query the registry on every up
    # to check for a digest update.
    image: natsio/nats-box:${NATSBOX_VERSION:-0.19.5}
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ensure_stream() {
          name=$$1; subject=$$2
          nats stream info "$$name" > /dev/null 2>&1 || \
            nats stream add "$$name" \
              --subjects "$$subject" \
              --retention limits \
              --storage file \
              --max-age 9600h \
              --deny-delete \
              --deny-purge \
              --defaults
        }
        ensure_stream vault_audit 'vault.audit.events'
        ensure_stream auth_audit  'auth.audit.events'
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "nats stream info vault_audit > /dev/null 2>&1 && nats stream info auth_audit > /dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 3s
    restart: unless-stopped

  # ── API server ────────────────────────────────────────────────────────────
  # Reached via Traefik at https://vault.localhost (host:443). The CLI uses
  # --server https://vault.localhost. mkcert-issued server cert (staged into
  # shared_data by `make _sync-shared`) is trusted by browsers + the host OS,
  # so OIDC redirects don't hit cert warnings. No host port mapping — all
  # browser traffic goes through Traefik; in-cluster traffic uses the
  # vault.localhost network alias below.
  vaultd:
    build: .
    image: abagile/tokyo3-vault:${VERSION:-latest}
    networks:
      default:
        # So Traefik (and anything else in the docker network) can resolve
        # `vault.localhost` directly to the vaultd container.
        aliases:
          - vault.localhost
    environment:
      VAULT_MASTER_KEY:          ${VAULT_MASTER_KEY:?VAULT_MASTER_KEY is required}
      VAULT_ADDR:                ${VAULT_ADDR:-:443}
      # Admin DSN: schema migration only (DDL privileges).
      VAULT_ADMIN_DATABASE_URL:  ${VAULT_ADMIN_DATABASE_URL:-postgres://${VAULT_ADMIN_DB_USERNAME:-vault_admin}:${VAULT_ADMIN_DB_PASSWORD}@db:5432/vault?sslmode=disable}
      # Runtime DSN: DML-only after schema is in place.
      VAULT_DATABASE_URL:        ${VAULT_DATABASE_URL:-postgres://${VAULT_DB_USERNAME:-vault_app}:${VAULT_DB_PASSWORD}@db:5432/vault?sslmode=disable}
      VAULT_NATS_URL:            ${VAULT_NATS_URL:-nats://nats:4222}
      VAULT_ALLOW_REGISTRATION:  ${VAULT_ALLOW_REGISTRATION:-false}
      # mkcert-signed API leaf. Overlays may point these elsewhere; unset to
      # fall back to vaultd's in-process self-signed cert.
      VAULT_API_CERT:            ${VAULT_API_CERT:-/shared/certs/vaultd-server.crt}
      VAULT_API_KEY:             ${VAULT_API_KEY:-/shared/certs/vaultd-server.key}
      # Trust the mkcert root CA so outbound HTTPS to https://auth.localhost
      # (OIDC discovery + token + userinfo + JWKS) validates against the
      # Traefik-presented cert. Go's crypto/x509 SystemCertPool falls back
      # to SSL_CERT_FILE on Linux.
      SSL_CERT_FILE:             /shared/certs/ca.crt
      # OIDC SSO. Default issuer points at tokyo3-auth (default IdP); to use
      # Authentik instead, override VAULT_OIDC_ISSUER in .env to
      # https://authentik.localhost/application/o/vault/ and run
      # `make docker-up-authentik`. CLIENT_ID/SECRET come from the IdP's
      # admin UI — see 'First-time setup' headers above. Until CLIENT_ID
      # is set, vaultd treats OIDC as unconfigured and only local auth works.
      VAULT_OIDC_ISSUER:         ${VAULT_OIDC_ISSUER:-https://auth.localhost}
      VAULT_OIDC_CLIENT_ID:      ${VAULT_OIDC_CLIENT_ID:-}
      VAULT_OIDC_CLIENT_SECRET:  ${VAULT_OIDC_CLIENT_SECRET:-}
      VAULT_OIDC_REDIRECT_URI:   ${VAULT_OIDC_REDIRECT_URI:-https://vault.localhost/api/v1/auth/oidc/callback}
      VAULT_OIDC_ENFORCE:        ${VAULT_OIDC_ENFORCE:-false}
    volumes:
      - shared_data:/shared:ro
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      natsbox:
        condition: service_healthy
      # No depends_on for the IdP: which one runs depends on the active
      # compose profile (tokyo3-auth vs authentik), and a missing/down
      # backend just makes OIDC discovery fail at vaultd startup —
      # `restart: unless-stopped` then recovers it once the IdP is up.
    restart: unless-stopped
    healthcheck:
      # /portal/login is unauthenticated, renders from in-memory state only
      # (no DB / OIDC / external dependency), and returns 200 for any client
      # without a portal-session cookie — which the wget probe never has.
      # start_period covers first-boot migrations.
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:443/portal/login"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Front-proxy ───────────────────────────────────────────────────────────
  # Listens on host:443, terminates TLS with the mkcert-issued vaultd-server
  # cert (SANs cover vault.localhost + auth.localhost + localhost), and
  # routes by Host header per /shared/traefik/dynamic.yml. Dashboard on
  # host:${TRAEFIK_DASHBOARD_PORT:-8080}.
  #
  # Network aliases here are the *resolution targets* used by anything else
  # in the docker network (e.g. vaultd dialing https://auth.localhost for
  # OIDC discovery) — Traefik then proxies based on Host header.
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.2}
    ports:
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    depends_on:
      vaultd:
        condition: service_started
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.filename=/shared/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    networks:
      default:
        aliases:
          - vault.localhost
          - auth.localhost
          - authentik.localhost
    volumes:
      - shared_data:/shared:ro
    restart: unless-stopped

  # ── tokyo3-auth: default IdP at https://auth.localhost ────────────────────
  # Separate Postgres database from vault's (auth runs its own schema +
  # migrations against authdb). Shares the same NATS instance, publishing to
  # the `auth_audit` stream (provisioned by natsbox above).
  #
  # tokyo3-auth listens on :443 inside the container with a mkcert-signed
  # cert at /shared/certs/authd-server.*. Traefik fronts it on host:443 for
  # the auth.localhost virtual host. SSL_CERT_FILE is set so auth's outbound
  # back-channel-logout POSTs to https://vault.localhost (its RPs) validate
  # the mkcert CA without a TLS verify error — same plumbing as vaultd.
  auth-db:
    image: postgres:17-alpine
    entrypoint: ["sh", "/shared/postgres/pg-entrypoint.sh"]
    environment:
      PG_INIT_SCRIPT:    /shared/postgres/db-init.sh
      POSTGRES_USER:     ${AUTH_ADMIN_DB_USERNAME:-auth_admin}
      POSTGRES_PASSWORD: ${AUTH_ADMIN_DB_PASSWORD:?AUTH_ADMIN_DB_PASSWORD is required}
      POSTGRES_DB:       authdb
      # db-init.sh reads VAULT_DB_USERNAME / VAULT_DB_PASSWORD to provision
      # the app role. We reuse the same script by aliasing AUTH_* into those
      # names — the script is name-agnostic, the env-var names just happen
      # to read "VAULT_*" for historical reasons.
      VAULT_DB_USERNAME: ${AUTH_DB_USERNAME:-auth_app}
      VAULT_DB_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD is required}
    volumes:
      - shared_data:/shared:ro
      - auth_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles: ["tokyo3-auth"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_ADMIN_DB_USERNAME:-auth_admin} -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  auth:
    image: abagile/tokyo3-auth:${TOKYO3_AUTH_VERSION:-latest}
    networks:
      default:
        aliases:
          - auth.localhost
    environment:
      AUTH_MASTER_KEY:           ${AUTH_MASTER_KEY:?AUTH_MASTER_KEY is required (64 hex chars)}
      AUTH_ADDR:                 ${AUTH_ADDR:-:443}
      AUTH_ISSUER:               ${AUTH_ISSUER:-https://auth.localhost}
      AUTH_API_CERT:             ${AUTH_API_CERT:-/shared/certs/authd-server.crt}
      AUTH_API_KEY:              ${AUTH_API_KEY:-/shared/certs/authd-server.key}
      AUTH_ADMIN_DATABASE_URL:   ${AUTH_ADMIN_DATABASE_URL:-postgres://${AUTH_ADMIN_DB_USERNAME:-auth_admin}:${AUTH_ADMIN_DB_PASSWORD}@auth-db:5432/authdb?sslmode=disable}
      AUTH_DATABASE_URL:         ${AUTH_DATABASE_URL:-postgres://${AUTH_DB_USERNAME:-auth_app}:${AUTH_DB_PASSWORD}@auth-db:5432/authdb?sslmode=disable}
      AUTH_NATS_URL:             ${AUTH_NATS_URL:-nats://nats:4222}
      AUTH_ALLOW_REGISTRATION:   ${AUTH_ALLOW_REGISTRATION:-true}
      # Trust the mkcert root CA so back-channel logout POSTs from auth
      # to its RPs (https://vault.localhost/...) verify cleanly.
      SSL_CERT_FILE:             /shared/certs/ca.crt
    volumes:
      - shared_data:/shared:ro
    depends_on:
      auth-db:
        condition: service_healthy
      nats:
        condition: service_healthy
      natsbox:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["tokyo3-auth"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:443/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Authentik's Postgres (separate DB from vault's) ───────────────────────
  authentik-postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    profiles: ["authentik"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER:     authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASSWORD:?AUTHENTIK_PG_PASSWORD is required (only when using --profile authentik)}
      POSTGRES_DB:       authentik
    volumes:
      - authentik_db:/var/lib/postgresql/data

  # ── Authentik web/API server (browser hits this for login + admin UI) ─────
  # Reached via Traefik at https://auth.localhost — no host port mapping.
  # Recent Authentik releases dropped the Redis dependency (cache + task
  # queue live in Postgres), so this stack runs DB + server + worker only.
  # Pin AUTHENTIK_TAG to a release that supports that (the default below
  # does — see https://github.com/goauthentik/authentik/releases).
  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10}
    restart: unless-stopped
    profiles: ["authentik"]
    command: server
    environment:
      AUTHENTIK_POSTGRESQL__HOST:          authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER:          authentik
      AUTHENTIK_POSTGRESQL__NAME:          authentik
      AUTHENTIK_POSTGRESQL__PASSWORD:      ${AUTHENTIK_PG_PASSWORD}
      AUTHENTIK_SECRET_KEY:                ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY is required (only when using --profile authentik; openssl rand -base64 60)}
      AUTHENTIK_ERROR_REPORTING__ENABLED:  "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK:      "true"
      AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"
      AUTHENTIK_BOOTSTRAP_EMAIL:           ${AUTHENTIK_BOOTSTRAP_EMAIL:-akadmin@localhost}
      AUTHENTIK_BOOTSTRAP_PASSWORD:        ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_TOKEN:           ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      # Trust the mkcert root CA so Authentik can POST OIDC Back-Channel
      # Logout notifications to https://vault.localhost without hitting a
      # TLS verify error. Python's `requests` honours SSL_CERT_FILE the
      # same way Go's crypto/x509 does.
      SSL_CERT_FILE:                       /shared/certs/ca.crt
      REQUESTS_CA_BUNDLE:                  /shared/certs/ca.crt
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      - shared_data:/shared:ro
    healthcheck:
      # `ak healthcheck` is Authentik's documented readiness probe — passes
      # only after DB migrations finish and the API can serve requests.
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    depends_on:
      authentik-postgresql:
        condition: service_healthy

  # ── Authentik background worker (handles SCIM, expressions, emails) ───────
  # user: root is what upstream recommends so the worker can read
  # /var/run/docker.sock for outpost lifecycle. Not needed for the basic
  # OIDC + SCIM flow against vault, so we drop the docker socket mount.
  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10}
    restart: unless-stopped
    profiles: ["authentik"]
    command: worker
    environment:
      AUTHENTIK_POSTGRESQL__HOST:      authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER:      authentik
      AUTHENTIK_POSTGRESQL__NAME:      authentik
      AUTHENTIK_POSTGRESQL__PASSWORD:  ${AUTHENTIK_PG_PASSWORD}
      AUTHENTIK_SECRET_KEY:            ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_EMAIL:       ${AUTHENTIK_BOOTSTRAP_EMAIL:-akadmin@localhost}
      AUTHENTIK_BOOTSTRAP_PASSWORD:    ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_TOKEN:       ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      # The worker dispatches OIDC Back-Channel Logout POSTs to RPs. It
      # needs to trust the mkcert root CA to call https://vault.localhost
      # without a TLS verify error.
      SSL_CERT_FILE:                   /shared/certs/ca.crt
      REQUESTS_CA_BUNDLE:              /shared/certs/ca.crt
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
      - authentik_certs:/certs
      - shared_data:/shared:ro
    depends_on:
      authentik-postgresql:
        condition: service_healthy

volumes:
  # External: populated by `make _sync-shared` (certs + postgres scripts
  # + traefik config tar-piped in). Marking it external keeps compose from
  # creating or destroying it — `docker-down-all -v` won't wipe the staged
  # contents.
  shared_data:
    external: true
  db_data:
  nats_data:
  auth_db_data:
  authentik_db:
  authentik_media:
  authentik_templates:
  authentik_certs:
