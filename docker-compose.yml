# docker-compose.yml — sample deployment: vaultd + Postgres + NATS JetStream + audit-consumer
#
# This sample wires all four components together without inter-service mTLS.
# For production hardening add:
#   NATS_AUDIT_CERT / NATS_AUDIT_KEY / NATS_AUDIT_CA        (vaultd publisher)
#   NATS_CONSUMER_CERT / NATS_CONSUMER_KEY / NATS_CONSUMER_CA (audit-consumer)
#   AUDIT_DB_SSL_* / AUDIT_WRITE_DB_SSL_*                   (audit DB mTLS)
#
# This sample also uses a single Postgres role for both the read (vaultd) and
# write (audit-consumer) sides of the audit DB. In production use separate roles:
#   vault_audit_reader  — SELECT-only  → AUDIT_DATABASE_URL
#   vault_audit_writer  — INSERT-only  → AUDIT_WRITE_DATABASE_URL
#
# Required env vars (set in shell or .env file):
#   VAULT_MASTER_KEY          64-char hex key  (vault keygen)
#   POSTGRES_PASSWORD         main vault DB admin password (vault owner, runs migrations)
#   VAULT_APP_PASSWORD        main vault DB app password (vault_app, DML-only)
#   AUDIT_POSTGRES_PASSWORD   audit DB admin password (vault_audit owner, runs migrations)
#   AUDIT_READER_PASSWORD     audit DB reader password (vault_audit_reader, SELECT-only)
#   AUDIT_WRITER_PASSWORD     audit DB writer password (vault_audit_writer, INSERT-only)
#
# Usage:
#   docker compose up -d

services:

  # ── Main vault database ───────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER:     vault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       vault
      VAULT_APP_PASSWORD: ${VAULT_APP_PASSWORD:?VAULT_APP_PASSWORD is required}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./postgres/db-init.sh:/docker-entrypoint-initdb.d/db-init.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dedicated audit database (separate from the main vault DB) ────────────
  audit-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER:     vault_audit
      POSTGRES_PASSWORD: ${AUDIT_POSTGRES_PASSWORD:?AUDIT_POSTGRES_PASSWORD is required}
      POSTGRES_DB:       vault_audit
      AUDIT_READER_PASSWORD: ${AUDIT_READER_PASSWORD:?AUDIT_READER_PASSWORD is required}
      AUDIT_WRITER_PASSWORD: ${AUDIT_WRITER_PASSWORD:?AUDIT_WRITER_PASSWORD is required}
    volumes:
      - audit-db-data:/var/lib/postgresql/data
      - ./postgres/audit-db-init.sh:/docker-entrypoint-initdb.d/audit-db-init.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NATS JetStream (authoritative audit event stream) ─────────────────────
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data
    restart: unless-stopped

  # ── API server ────────────────────────────────────────────────────────────
  vaultd:
    build: .
    image: abagile/vault:${VERSION:-latest}
    ports:
      - "${VAULT_PORT:-8443}:8443"
    environment:
      VAULT_MASTER_KEY:         ${VAULT_MASTER_KEY:?VAULT_MASTER_KEY is required}
      # Admin DSN: schema migration only (vault owner, DDL privileges).
      VAULT_ADMIN_DATABASE_URL: postgres://vault:${POSTGRES_PASSWORD}@db:5432/vault?sslmode=disable
      # Runtime DSN: DML-only after schema is in place.
      VAULT_DATABASE_URL:       postgres://vault_app:${VAULT_APP_PASSWORD}@db:5432/vault?sslmode=disable
      VAULT_ADDR:               :8443
      # Audit sink: publish events to NATS JetStream (fail-closed).
      NATS_URL:           nats://nats:4222
      # Audit read DB: serves GET /api/v1/audit — SELECT-only role.
      AUDIT_DATABASE_URL: postgres://vault_audit_reader:${AUDIT_READER_PASSWORD}@audit-db:5432/vault_audit?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      audit-db:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/api/v1/projects"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Audit consumer: NATS → audit DB projection writer ────────────────────
  audit-consumer:
    image: abagile/vault:${VERSION:-latest}
    command: ["audit-consumer"]
    environment:
      NATS_URL:                  nats://nats:4222
      # Admin DSN: schema migrations only (vault_audit owner, DDL privileges).
      AUDIT_ADMIN_DATABASE_URL:  postgres://vault_audit:${AUDIT_POSTGRES_PASSWORD}@audit-db:5432/vault_audit?sslmode=disable
      # Write DSN: DML-only after schema is in place.
      AUDIT_WRITE_DATABASE_URL:  postgres://vault_audit_writer:${AUDIT_WRITER_PASSWORD}@audit-db:5432/vault_audit?sslmode=disable
    depends_on:
      audit-db:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

volumes:
  db-data:
  audit-db-data:
  nats-data:
