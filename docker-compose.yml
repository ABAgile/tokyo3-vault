# docker-compose.yml — sample deployment: vaultd + Postgres + NATS JetStream + audit-consumer
#
# This sample wires all four components together without inter-service mTLS.
# For production hardening add:
#   NATS_AUDIT_CERT / NATS_AUDIT_KEY / NATS_AUDIT_CA        (vaultd publisher)
#   NATS_CONSUMER_CERT / NATS_CONSUMER_KEY / NATS_CONSUMER_CA (audit-consumer)
#   AUDIT_DB_SSL_* / AUDIT_WRITE_DB_SSL_*                   (audit DB mTLS)
#
# This sample also uses a single Postgres role for both the read (vaultd) and
# write (audit-consumer) sides of the audit DB. In production use separate roles:
#   vault_audit_reader  — SELECT-only  → AUDIT_DATABASE_URL
#   vault_audit_writer  — INSERT-only  → AUDIT_WRITE_DATABASE_URL
#
# Required env vars (set in shell or .env file):
#   VAULT_MASTER_KEY          64-char hex key  (vault keygen)
#   POSTGRES_PASSWORD         main vault DB password
#   AUDIT_POSTGRES_PASSWORD   audit DB password
#
# Usage:
#   docker compose up -d

services:

  # ── Main vault database ───────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER:     vault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       vault
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dedicated audit database (separate from the main vault DB) ────────────
  audit-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER:     vault_audit
      POSTGRES_PASSWORD: ${AUDIT_POSTGRES_PASSWORD:?AUDIT_POSTGRES_PASSWORD is required}
      POSTGRES_DB:       vault_audit
    volumes:
      - audit-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NATS JetStream (authoritative audit event stream) ─────────────────────
  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data
    restart: unless-stopped

  # ── API server ────────────────────────────────────────────────────────────
  vaultd:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT:  ${COMMIT:-unknown}
    image: abagile/vault:${VERSION:-latest}
    ports:
      - "${VAULT_PORT:-8443}:8443"
    environment:
      VAULT_MASTER_KEY:   ${VAULT_MASTER_KEY:?VAULT_MASTER_KEY is required}
      VAULT_DATABASE_URL: postgres://vault:${POSTGRES_PASSWORD}@db:5432/vault?sslmode=disable
      VAULT_ADDR:         :8443
      # Audit sink: publish events to NATS JetStream (fail-closed).
      NATS_URL:           nats://nats:4222
      # Audit read DB: serves GET /api/v1/audit (SELECT-only in production).
      AUDIT_DATABASE_URL: postgres://vault_audit:${AUDIT_POSTGRES_PASSWORD}@audit-db:5432/vault_audit?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      audit-db:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/api/v1/projects"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Audit consumer: NATS → audit DB projection writer ────────────────────
  audit-consumer:
    image: abagile/vault:${VERSION:-latest}
    command: ["audit-consumer"]
    environment:
      # NATS subscriber (INSERT-only into audit DB in production).
      NATS_URL:                 nats://nats:4222
      AUDIT_WRITE_DATABASE_URL: postgres://vault_audit:${AUDIT_POSTGRES_PASSWORD}@audit-db:5432/vault_audit?sslmode=disable
    depends_on:
      audit-db:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

volumes:
  db-data:
  audit-db-data:
  nats-data:
