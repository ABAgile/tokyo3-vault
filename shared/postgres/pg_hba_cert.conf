# pg_hba.conf — used by the mTLS overlay only (docker-compose.mtls.yml).
# Local socket: trusted for docker-entrypoint-initdb.d scripts.
local   all   all             trust
# SSL connections: authenticate via client certificate (CN must match role name).
hostssl all   all   all       cert
# Plain TCP (no TLS): rejected.
host    all   all   all       reject
