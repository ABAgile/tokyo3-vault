{{template "base" .}}

{{define "title"}}New project{{end}}
{{define "pagetitle"}}New project{{end}}

{{define "content"}}
{{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}

<div class="card" style="max-width:560px">
  <div class="card-body">
    <form method="POST" action="/portal/projects/new">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{.Name}}" required autofocus>
      </div>
      <div class="form-group">
        <label for="slug">Slug <span class="text-muted" style="font-size:12px">(optional — derived from name)</span></label>
        <input type="text" id="slug" name="slug" value="{{.Slug}}" pattern="[a-z0-9][a-z0-9\-]{0,61}[a-z0-9]" placeholder="my-project">
        <div class="text-muted" style="font-size:12px;margin-top:4px">Lowercase alphanumeric with hyphens, 2–63 chars. Used in URLs and CLI commands.</div>
      </div>
      <div style="display:flex;gap:10px">
        <button type="submit" class="btn btn-primary">Create project</button>
        <a href="/portal/projects" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
