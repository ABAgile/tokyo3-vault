{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create account — tokyo3-vault</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body class="sso-body">
<div class="sso-card">
  <div class="brand">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1l9 4v6c0 5.55-3.84 10.74-9 12-5.16-1.26-9-6.45-9-12V5l9-4zm-1 13.59L7.41 11 6 12.41 11 17.41 18.41 10 17 8.59 11 14.59z"/>
    </svg>
    <span>tokyo3-vault</span>
  </div>
  <h1>Create account</h1>
  <p class="subtitle">Register a new portal account.</p>

  {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}

  <form method="POST" action="/portal/register">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{.Email}}" required autofocus autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password" minlength="12">
    </div>
    <div class="form-group">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" required autocomplete="new-password" minlength="12">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create account</button>
  </form>
  <p class="form-footer" style="text-align:center;margin-top:16px"><a href="/portal/login">Already have an account? Sign in</a></p>
</div>
</body>
</html>
{{end}}
