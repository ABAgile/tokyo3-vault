# Litestream replication config — streams the SQLite WAL to S3 continuously.
# RPO (recovery point objective): ~1 second.
# Full restore from S3 on first boot if the local DB is missing.
#
# Required env vars:
#   VAULT_DB_PATH          path to vault.db (e.g. /data/vault.db)
#   LITESTREAM_S3_BUCKET   S3 bucket name
#   AWS_REGION             e.g. us-east-1
#
# Auth: use IAM role on EC2/ECS (preferred) or set:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY

dbs:
  - path: ${VAULT_DB_PATH}
    replicas:
      - type: s3
        bucket: ${LITESTREAM_S3_BUCKET}
        path: vault/db
        region: ${AWS_REGION}
