# docker-compose.mtls.yml — mTLS overlay
#
# Enables TLS on all inter-service connections:
#   vaultd HTTPS API        VAULT_API_CERT / VAULT_API_KEY
#   NATS server TLS + mTLS  --tls / --tlsverify + client certs on both sides
#   vaultd → postgres       client cert + cert auth (no password in DSN)
#   vaultd → NATS           client cert (publisher + reader identity)
#
# Prerequisites:
#   1. make docker-up-mtls        # auto-generates leaf certs (signed by mkcert's
#                                 # root) and populates shared_data volume.
#                                 # The root CA is mkcert's, kept at $(mkcert -CAROOT)
#                                 # — _sync-shared stages it into /shared/certs/ca.crt
#                                 # for the mounts referenced below.
#
#   To regenerate leaf certs: rm shared/certs/vaultd-server.crt, then re-run make docker-up-mtls.
#   To rotate the root CA:    mkcert -uninstall && mkcert -install on the host.
#
# PostgreSQL cert auth:
#   pg_hba_cert.conf replaces the default pg_hba.conf. All TCP connections must
#   use TLS with a client cert whose CN matches the connecting role name:
#     vaultd-admin-db-client.crt  CN=${VAULT_ADMIN_DB_USERNAME:-vault_admin}  → VAULT_ADMIN_DATABASE_URL
#     vaultd-app-db-client.crt    CN=${VAULT_DB_USERNAME:-vault_app}          → VAULT_DATABASE_URL
#   If any username env var is changed from its default, remove the shared_data
#   volume and re-run to regenerate certs with the correct CNs.

services:

  # ── Main vault database: enable server TLS + cert auth ────────────────────
  # shared_data:/shared is already mounted by the base file (for postgres scripts).
  db:
    environment:
      POSTGRES_SSL_CERT: /shared/certs/db-server.crt
      POSTGRES_SSL_KEY:  /shared/certs/db-server.key
      POSTGRES_SSL_CA:   /shared/certs/ca.crt

  # ── NATS: enable server TLS + require client certs ────────────────────────
  nats:
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--tls"
      - "--tlscert=/shared/certs/nats-server.crt"
      - "--tlskey=/shared/certs/nats-server.key"
      - "--tlscacert=/shared/certs/ca.crt"
      - "--tlsverify"
      - "-m"
      - "8222"
    volumes:
      - shared_data:/shared:ro

  # ── nats-box: TLS context + stream provisioner ────────────────────────────
  # Reuses vaultd-nats-client.crt for both stream provisioning and
  # interactive inspection — the dev NATS server has no per-subject auth, so
  # a valid client cert grants full access. A `default` nats context is saved
  # at startup so subsequent CLI calls inherit the TLS settings:
  #   docker compose exec natsbox nats sub 'vault.audit.events'
  natsbox:
    environment:
      NATS_URL: tls://nats:4222
    command:
      - |
        set -e
        nats context save default \
          --server tls://nats:4222 \
          --tlscert /shared/certs/vaultd-nats-client.crt \
          --tlskey /shared/certs/vaultd-nats-client.key \
          --tlsca /shared/certs/ca.crt \
          --select > /dev/null
        nats stream info vault_audit > /dev/null 2>&1 || \
          nats stream add vault_audit \
            --subjects 'vault.audit.events' \
            --retention limits \
            --storage file \
            --max-age 9600h \
            --deny-delete \
            --deny-purge \
            --defaults
        exec tail -f /dev/null
    volumes:
      - shared_data:/shared:ro

  # ── vaultd: add mTLS for NATS and Postgres ───────────────────────────────
  # The base file already wires VAULT_API_CERT/KEY (mkcert-signed) and mounts
  # shared_data:/shared, so this overlay only layers in the inter-service
  # mTLS bits — DB cert auth + NATS client identity.
  vaultd:
    environment:
      # Single workload CA root — every internal mTLS channel inherits this
      # unless overridden by a per-channel VAULT_*_CA below.
      VAULT_WORKLOAD_CA:        /shared/certs/ca.crt
      VAULT_ADMIN_DB_CERT:      /shared/certs/vaultd-admin-db-client.crt
      VAULT_ADMIN_DB_KEY:       /shared/certs/vaultd-admin-db-client.key
      # Cert auth: no password; cert CN authenticates the role.
      VAULT_ADMIN_DATABASE_URL: postgres://${VAULT_ADMIN_DB_USERNAME:-vault_admin}@db:5432/vault?sslmode=verify-full
      VAULT_DB_CERT:            /shared/certs/vaultd-app-db-client.crt
      VAULT_DB_KEY:             /shared/certs/vaultd-app-db-client.key
      # Cert auth: no password; cert CN authenticates the role.
      VAULT_DATABASE_URL:       postgres://${VAULT_DB_USERNAME:-vault_app}@db:5432/vault?sslmode=verify-full
      VAULT_NATS_CERT:          /shared/certs/vaultd-nats-client.crt
      VAULT_NATS_KEY:           /shared/certs/vaultd-nats-client.key
      VAULT_NATS_URL:           tls://nats:4222

  # ── tokyo3-auth DB: enable server TLS + cert auth ─────────────────────────
  # Mirrors the `db` block above. Shares db-server.crt — its SAN list covers
  # both `db` and `auth-db` hostnames (see shared/certs/gen.sh).
  auth-db:
    environment:
      POSTGRES_SSL_CERT: /shared/certs/db-server.crt
      POSTGRES_SSL_KEY:  /shared/certs/db-server.key
      POSTGRES_SSL_CA:   /shared/certs/ca.crt

  # ── tokyo3-auth: add mTLS for NATS and Postgres ──────────────────────────
  # Same pattern as vaultd above — the base file wires AUTH_API_CERT/KEY for
  # the HTTPS API; this overlay only layers the inter-service mTLS material.
  # Without these env vars set, NATS's --tlsverify rejects auth's plain-text
  # connection with `tls: certificate required` and the service fails to boot.
  auth:
    environment:
      AUTH_WORKLOAD_CA:        /shared/certs/ca.crt
      AUTH_ADMIN_DB_CERT:      /shared/certs/authd-admin-db-client.crt
      AUTH_ADMIN_DB_KEY:       /shared/certs/authd-admin-db-client.key
      AUTH_ADMIN_DATABASE_URL: postgres://${AUTH_ADMIN_DB_USERNAME:-auth_admin}@auth-db:5432/authdb?sslmode=verify-full
      AUTH_DB_CERT:            /shared/certs/authd-app-db-client.crt
      AUTH_DB_KEY:             /shared/certs/authd-app-db-client.key
      AUTH_DATABASE_URL:       postgres://${AUTH_DB_USERNAME:-auth_app}@auth-db:5432/authdb?sslmode=verify-full
      AUTH_NATS_CERT:          /shared/certs/authd-nats-client.crt
      AUTH_NATS_KEY:           /shared/certs/authd-nats-client.key
      AUTH_NATS_URL:           tls://nats:4222
